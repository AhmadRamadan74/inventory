  <rect x="122" y="85" width="4" height="5" rx="1" fill="white" opacity="0.5"/>
  <rect x="128" y="85" width="4" height="5" rx="1" fill="white" opacity="0.5"/>
  <rect x="122" y="96" width="4" height="5" rx="1" fill="white" opacity="0.5"/>
  <rect x="128" y="96" width="4" height="5" rx="1" fill="white" opacity="0.5"/>
