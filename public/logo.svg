  <rect x="102" y="75" width="5" height="7" rx="1" fill="white" opacity="0.6"/>
  <rect x="95" y="88" width="5" height="7" rx="1" fill="white" opacity="0.6"/>
  <rect x="102" y="88" width="5" height="7" rx="1" fill="white" opacity="0.6"/>
  <rect x="95" y="101" width="5" height="7" rx="1" fill="white" opacity="0.6"/>
  <rect x="102" y="101" width="5" height="7" rx="1" fill="white" opacity="0.6"/>
  <!-- Side windows -->
  <rect x="72" y="90" width="4" height="5" rx="1" fill="white" opacity="0.5"/>
